name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy src tests

      - name: Check docs alignment
        run: python ./scripts/check_docs_alignment.py

      - name: Run pytest
        run: python -m pytest -q

      - name: Run offline smoke test
        env:
          VERIFYVAT_CLI_BIN: verifyvat
          VERIFYVAT_PYTHON_BIN: python
        run: bash ./scripts/smoke_test.sh --offline
